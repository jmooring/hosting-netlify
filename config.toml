baseURL = 'https://hosting-netlify.netlify.app/'
languageCode = 'en-us'
title = 'Hosting Test - Netlify'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true
disableKinds = ['RSS', 'taxonomy', 'term']
enableGitInfo = true

[build]
useResourceCacheWhen = 'never'

[languages.en]
contentDir = 'content/en'
languageCode = 'en-US'
languageName = 'English'
weight = 1

[languages.de]
contentDir = 'content/de'
languageCode = 'de-DE'
languageName = 'Deutsch'
weight = 2

[[menu.main]]
name = 'Home'
pageRef = '/'
weight = '10'

[[menu.main]]
name = 'Posts'
pageRef = '/posts'
weight = '20'

[[module.mounts]]
source = 'assets'
target = 'assets'

[[module.mounts]]
source = 'node_modules/normalize.css/normalize.css'
target = 'assets/sass/normalize.scss'
